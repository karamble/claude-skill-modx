name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint install.sh and uninstall.sh
        run: shellcheck install.sh uninstall.sh

      - name: Lint skill/scripts/*.sh
        run: shellcheck skill/scripts/*.sh
